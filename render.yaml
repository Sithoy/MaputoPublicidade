services:
  - type: web
    name: maputo-publicidade-backend
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: cd backend && python manage.py migrate --noinput && python manage.py seed_initial_data && python manage.py ensure_admin_user && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: ADMIN_EMAIL
        value: admin@maputopublicidade.co.mz
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_RESET_PASSWORD
        value: "True"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: https://maputopublicidade.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://maputopublicidade.vercel.app
      - key: SERVE_MEDIA
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: maputopublicidade@outlook.com
      - key: ADMIN_EMAIL
        value: maputopublicidade@outlook.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_REGION_NAME
        value: us-east-1
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
